    <div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0; color: #333;">Daftar Stok Bahan Ajar</h2>
        </div>
        
        <!-- Filters -->
        <div class="filter-container">
            <div class="filter-row">
                <div class="filter-group">
                    <label>UT-Daerah</label>
                    <select v-model="filters.upbjj">
                        <option value="">Semua UT-Daerah</option>
                        <option v-for="u in upbjjOptions" :value="u">{{ u }}</option>
                    </select>
                </div>
                
                <div class="filter-group" v-if="filters.upbjj">
                    <label>Kategori</label>
                    <select v-model="filters.kategori">
                        <option value="">Semua Kategori</option>
                        <option v-for="k in availableKategoriOptions" :value="k">{{ k }}</option>
                    </select>
                </div>
                
                <div class="filter-group" style="display: flex; align-items: center; padding-bottom: 10px;">
                    <label style="cursor: pointer; display: flex; align-items: center; margin: 0;">
                        <input type="checkbox" v-model="filters.lowStock"> 
                        <span style="margin-left: 8px;">Tampilkan Stok Menipis/Kosong</span>
                    </label>
                </div>
                
                <div class="filter-group" style="flex: 0 0 auto;">
                    <label>&nbsp;</label>
                    <button class="btn-small btn-secondary" @click="resetFilters">Reset Filter</button>
                </div>
            </div>
            
            <div class="filter-row" style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
                <div class="filter-group">
                    <label>Urutkan Berdasarkan</label>
                    <div style="display: flex; gap: 10px;">
                        <select v-model="sortBy" style="width: auto; flex: 1;">
                            <option value="judul">Judul Mata Kuliah</option>
                            <option value="qty">Jumlah Stok</option>
                            <option value="harga">Harga</option>
                        </select>
                        <label style="display: flex; align-items: center; margin: 0; font-weight: normal;">
                            <input type="checkbox" v-model="sortDesc"> Descending
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Form -->
        <div class="filter-container" style="background: white; border: 1px solid #e0e0e0;">
            <h3 style="margin-top: 0; color: #667eea;">Tambah Bahan Ajar Baru</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label>Kode MK</label>
                    <input v-model="newStock.kode" placeholder="Contoh: EKMA4116">
                </div>
                <div class="form-group">
                    <label>Nama Mata Kuliah</label>
                    <input v-model="newStock.judul" placeholder="Judul MK">
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <select v-model="newStock.kategori">
                        <option value="" disabled>Pilih Kategori</option>
                        <option v-for="k in kategoriOptions" :value="k">{{ k }}</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>UT-Daerah</label>
                    <select v-model="newStock.upbjj">
                        <option value="" disabled>Pilih UPBJJ</option>
                        <option v-for="u in upbjjOptions" :value="u">{{ u }}</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Lokasi Rak</label>
                    <input v-model="newStock.lokasiRak" placeholder="Contoh: A-01">
                </div>
                <div class="form-group">
                    <label>Harga (Rp)</label>
                    <input type="number" v-model="newStock.harga">
                </div>
                <div class="form-group">
                    <label>Stok Awal</label>
                    <input type="number" v-model="newStock.qty">
                </div>
                <div class="form-group">
                    <label>Safety Stock</label>
                    <input type="number" v-model="newStock.safety">
                </div>
                <div class="form-group full-width">
                    <label>Catatan (HTML allowed)</label>
                    <input v-model="newStock.catatan" placeholder="Catatan tambahan..." @keyup.enter="addStock">
                </div>
                <div class="form-group full-width">
                    <button class="btn-small btn-success" @click="addStock" style="padding: 10px 20px;">
                        + Tambah Data
                    </button>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>Kode</th>
                        <th>Judul</th>
                        <th>Kategori</th>
                        <th>UPBJJ</th>
                        <th>Rak</th>
                        <th>Harga</th>
                        <th>Stok</th>
                        <th>Safety</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="item in filteredItems" :key="item.kode + item.upbjj">
                        <template v-if="editingId === item.kode + item.upbjj">
                            <td>{{ item.kode }}</td>
                            <td><input v-model="editForm.judul" class="input-modern" style="padding: 5px;"></td>
                            <td>
                                <select v-model="editForm.kategori" style="padding: 5px;">
                                    <option v-for="k in kategoriOptions" :value="k">{{ k }}</option>
                                </select>
                            </td>
                            <td>{{ item.upbjj }}</td>
                            <td><input v-model="editForm.lokasiRak" style="width: 60px; padding: 5px;"></td>
                            <td><input type="number" v-model="editForm.harga" style="width: 80px; padding: 5px;"></td>
                            <td><input type="number" v-model="editForm.qty" style="width: 60px; padding: 5px;"></td>
                            <td><input type="number" v-model="editForm.safety" style="width: 60px; padding: 5px;"></td>
                            <td>-</td>
                            <td>
                                <div style="display: flex; gap: 5px;">
                                    <button class="btn-small btn-success" @click="saveEdit">✓</button>
                                    <button class="btn-small btn-secondary" @click="cancelEdit">✕</button>
                                </div>
                            </td>
                        </template>
                        <template v-else>
                            <td><strong>{{ item.kode }}</strong></td>
                            <td>{{ item.judul }}</td>
                            <td>{{ item.kategori }}</td>
                            <td>{{ item.upbjj }}</td>
                            <td>{{ item.lokasiRak }}</td>
                            <td>{{ formatCurrency(item.harga) }}</td>
                            <td>{{ item.qty }} buah</td>
                            <td>{{ item.safety }} buah</td>
                            <td>
                                <div class="tooltip-container">
                                    <status-badge :stok="item.qty" :safety="item.safety"></status-badge>
                                    <span class="tooltip-text" v-if="item.catatan" v-html="item.catatan"></span>
                                </div>
                            </td>
                            <td>
                                <div style="display: flex; gap: 5px;">
                                    <button class="btn-small" style="background: #ffc107; color: #000;" @click="startEdit(item)">Edit</button>
                                    <button class="btn-small" style="background: #dc3545;" @click="confirmDelete(item)">Hapus</button>
                                </div>
                            </td>
                        </template>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
