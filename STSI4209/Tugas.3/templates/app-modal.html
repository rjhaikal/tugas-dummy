    <transition name="fade">
        <div class="modal-mask" v-if="isVisible">
            <div class="modal-container">
                <div class="modal-header">
                    <h3>{{ title }}</h3>
                </div>
                <div class="modal-body">
                    {{ message }}
                </div>
                <div class="modal-footer">
                    <button class="btn-small btn-secondary" @click="hide">Batal</button>
                    <button class="btn-small btn-success" @click="confirm" v-if="onConfirm" style="margin-left: 10px;">OK</button>
                    <button class="btn-small btn-primary" @click="hide" v-else style="margin-left: 10px;">Tutup</button>
                </div>
            </div>
        </div>
    </transition>
